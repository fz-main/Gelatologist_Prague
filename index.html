<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelatologist — Artigianale Gelato Praha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8F0;
    --warm: #F5E6D3;
    --caramel: #C4822A;
    --pistachio: #7A9B6E;
    --berry: #9B4B6E;
    --chocolate: #3D1F0D;
    --gold: #D4A853;
    --blush: #E8B4A0;
    --mint: #A8D5C0;
    --dark: #1A0F08;
    --text: #2C1810;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CURSOR ── */
  .cursor {
    width: 12px; height: 12px;
    background: var(--caramel);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transition: transform 0.15s ease, background 0.3s ease;
    mix-blend-mode: multiply;
  }
  .cursor-ring {
    width: 40px; height: 40px;
    border: 1.5px solid var(--caramel);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transition: transform 0.35s cubic-bezier(.17,.67,.35,.98), opacity 0.3s ease;
    opacity: 0.6;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0;
    background: var(--chocolate);
    z-index: 9990;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    animation: loaderOut 0.8s 2.8s cubic-bezier(.77,0,.18,1) forwards;
  }
  .loader-scoop {
    width: 100px; height: 100px;
    position: relative;
    animation: scoopFloat 1.5s ease-in-out infinite;
  }
  .loader-scoop svg { width: 100%; height: 100%; }
  .loader-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--cream);
    margin-top: 24px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    overflow: hidden;
  }
  .loader-text span {
    display: inline-block;
    animation: letterIn 0.6s cubic-bezier(.215,.61,.355,1) both;
  }
  .loader-bar {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.15);
    margin-top: 32px;
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--caramel), var(--gold), var(--blush));
    animation: barFill 2.2s 0.3s cubic-bezier(.4,0,.2,1) forwards;
    border-radius: 2px;
  }
  @keyframes loaderOut {
    to { transform: translateY(-100%); }
  }
  @keyframes scoopFloat {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }
  @keyframes letterIn {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes barFill {
    to { width: 100%; }
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.5s ease, padding 0.4s ease, box-shadow 0.4s ease;
  }
  nav.scrolled {
    background: rgba(255,248,240,0.92);
    backdrop-filter: blur(16px);
    padding: 14px 40px;
    box-shadow: 0 2px 30px rgba(60,20,0,0.08);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--cream);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.4s;
  }
  nav.scrolled .nav-logo { color: var(--chocolate); }
  .nav-links {
    display: flex; gap: 36px; list-style: none; align-items: center;
  }
  .nav-links a {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,248,240,0.85);
    text-decoration: none;
    position: relative;
    transition: color 0.3s;
  }
  nav.scrolled .nav-links a { color: var(--text); }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--caramel);
    transition: width 0.3s ease;
  }
  .nav-links a:hover::after { width: 100%; }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex; gap: 8px; align-items: center;
  }
  .lang-btn {
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,248,240,0.6);
    background: none; border: none; cursor: none;
    padding: 2px 4px; transition: color 0.3s;
  }
  nav.scrolled .lang-btn { color: rgba(44,24,16,0.5); }
  .lang-btn.active, .lang-btn:hover { color: var(--caramel); }
  .lang-sep { color: rgba(255,248,240,0.3); font-size: 0.7rem; }
  nav.scrolled .lang-sep { color: rgba(44,24,16,0.2); }

  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    background: none; border: none; cursor: none; padding: 4px;
  }
  .hamburger span {
    width: 24px; height: 2px;
    background: var(--cream);
    border-radius: 2px;
    transition: background 0.4s, transform 0.4s;
  }
  nav.scrolled .hamburger span { background: var(--chocolate); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(156,75,110,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 20%, rgba(122,155,110,0.3) 0%, transparent 55%),
      radial-gradient(ellipse 90% 70% at 50% 50%, rgba(196,130,42,0.2) 0%, transparent 70%),
      linear-gradient(160deg, #1A0F08 0%, #2C1810 40%, #3D1F0D 70%, #1A0F08 100%);
  }
  /* animated blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    animation: blobFloat 12s ease-in-out infinite;
  }
  .blob-1 { width: 600px; height: 600px; background: radial-gradient(var(--caramel), transparent); top: -200px; right: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(var(--berry), transparent); bottom: -100px; left: -100px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: radial-gradient(var(--pistachio), transparent); top: 40%; left: 30%; animation-delay: -8s; }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: particleDrift linear infinite;
    opacity: 0;
  }
  @keyframes particleDrift {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-20px) rotate(360deg); opacity: 0; }
  }

  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 0 24px;
  }
  .hero-pre {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s 3s ease forwards;
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .hero-pre::before, .hero-pre::after {
    content: '';
    width: 40px; height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 0.9;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.9s 3.1s ease forwards;
  }
  .hero-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
    display: block;
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-style: italic;
    color: rgba(255,248,240,0.65);
    margin-top: 24px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.9s 3.3s ease forwards;
  }
  .hero-ctas {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.9s 3.5s ease forwards;
  }
  .btn-primary {
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--caramel), var(--gold));
    color: var(--cream);
    border: none;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 8px 32px rgba(196,130,42,0.4);
  }
  .btn-primary::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--caramel));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(196,130,42,0.5); }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary span { position: relative; z-index: 1; }
  .btn-outline {
    padding: 15px 40px;
    background: transparent;
    color: var(--cream);
    border: 1.5px solid rgba(255,248,240,0.4);
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    transition: border-color 0.3s, background 0.3s, transform 0.3s;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 3.8s ease forwards;
  }
  .scroll-text {
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,248,240,0.4);
  }
  .scroll-line {
    width: 1px; height: 50px;
    background: linear-gradient(to bottom, rgba(255,248,240,0.4), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(1); opacity: 0.4; }
    50% { transform: scaleY(0.5); opacity: 0.8; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* floating gelato visual */
  .hero-gelato {
    position: absolute;
    right: 5%; top: 50%;
    transform: translateY(-50%);
    width: clamp(200px, 30vw, 420px);
    opacity: 0;
    animation: fadeUp 1s 3.4s ease forwards;
    pointer-events: none;
    z-index: 1;
  }
  .hero-gelato svg { width: 100%; height: auto; filter: drop-shadow(0 30px 60px rgba(196,130,42,0.3)); }

  /* ── SECTION BASE ── */
  section { padding: 100px 0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .section-label {
    font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--caramel); font-weight: 500; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before { content: ''; width: 30px; height: 1px; background: var(--caramel); }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.15;
    color: var(--chocolate);
  }
  .section-title em { font-style: italic; color: var(--caramel); }

  /* reveal */
  .reveal {
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── ABOUT / INTRO STRIP ── */
  #about {
    background: var(--chocolate);
    padding: 80px 0;
    overflow: hidden;
    position: relative;
  }
  #about::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(196,130,42,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 50%, rgba(122,155,110,0.1) 0%, transparent 50%);
  }
  .about-inner {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .about-text .section-label { color: var(--gold); }
  .about-text .section-label::before { background: var(--gold); }
  .about-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 24px;
  }
  .about-title em { font-style: italic; color: var(--gold); }
  .about-desc {
    font-size: 1rem; line-height: 1.8;
    color: rgba(255,248,240,0.7);
    margin-bottom: 32px;
  }
  .stats-row {
    display: flex; gap: 40px; flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 900;
    color: var(--gold); line-height: 1;
    display: block;
  }
  .stat-label {
    font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,248,240,0.5); margin-top: 4px;
  }
  .about-visual {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .about-card {
    background: rgba(255,248,240,0.05);
    border: 1px solid rgba(255,248,240,0.08);
    border-radius: 20px;
    padding: 28px 24px;
    backdrop-filter: blur(10px);
    transition: background 0.4s, border-color 0.4s, transform 0.4s;
    position: relative; overflow: hidden;
  }
  .about-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,248,240,0.04), transparent);
    opacity: 0; transition: opacity 0.4s;
  }
  .about-card:hover { background: rgba(255,248,240,0.08); border-color: rgba(212,168,83,0.3); transform: translateY(-4px); }
  .about-card:hover::before { opacity: 1; }
  .about-card:nth-child(2) { margin-top: 32px; }
  .about-card:nth-child(4) { margin-top: -32px; }
  .card-icon { font-size: 2rem; margin-bottom: 12px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--cream);
    margin-bottom: 8px;
  }
  .card-desc { font-size: 0.85rem; line-height: 1.6; color: rgba(255,248,240,0.55); }

  /* ── ADVANTAGES ── */
  #advantages {
    background: var(--warm);
    position: relative; overflow: hidden;
  }
  #advantages::before {
    content: '';
    position: absolute; top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(var(--blush), transparent 70%);
    opacity: 0.3;
  }
  .adv-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    margin-top: 60px;
  }
  .adv-card {
    background: var(--cream);
    border-radius: 24px;
    padding: 40px 32px;
    position: relative; overflow: hidden;
    transition: transform 0.4s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.4s;
    cursor: none;
  }
  .adv-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--caramel), var(--gold));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease;
  }
  .adv-card:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(60,20,0,0.1); }
  .adv-card:hover::after { transform: scaleX(1); }
  .adv-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .adv-card:nth-child(1) .adv-icon { background: rgba(196,130,42,0.12); }
  .adv-card:nth-child(2) .adv-icon { background: rgba(122,155,110,0.12); }
  .adv-card:nth-child(3) .adv-icon { background: rgba(155,75,110,0.12); }
  .adv-card:nth-child(4) .adv-icon { background: rgba(168,213,192,0.2); }
  .adv-card:nth-child(5) .adv-icon { background: rgba(212,168,83,0.12); }
  .adv-card:nth-child(6) .adv-icon { background: rgba(232,180,160,0.2); }
  .adv-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; color: var(--chocolate);
    margin-bottom: 12px;
  }
  .adv-text { font-size: 0.9rem; line-height: 1.7; color: rgba(44,24,16,0.65); }

  /* ── SERVICES ── */
  #services {
    background: var(--cream);
    position: relative;
  }
  .services-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
    margin-top: 60px;
  }
  .service-card {
    border-radius: 24px; overflow: hidden;
    position: relative; min-height: 340px;
    cursor: none;
    group: true;
  }
  .service-bg {
    position: absolute; inset: 0;
    transition: transform 0.6s cubic-bezier(.25,.46,.45,.94);
  }
  .service-card:hover .service-bg { transform: scale(1.06); }
  .service-card:nth-child(1) .service-bg {
    background: linear-gradient(160deg, #3D1F0D 0%, #5C2E10 50%, #7A4020 100%);
  }
  .service-card:nth-child(2) .service-bg {
    background: linear-gradient(160deg, #1F3828 0%, #2E5540 50%, #3D7255 100%);
  }
  .service-card:nth-child(3) .service-bg {
    background: linear-gradient(160deg, #2A1A2E 0%, #4A2855 50%, #6B3870 100%);
  }
  .service-card:nth-child(4) .service-bg {
    background: linear-gradient(160deg, #2A1810 0%, #8B5E3C 50%, #C4822A 100%);
  }
  .service-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  }
  .service-content {
    position: relative; z-index: 2;
    padding: 36px;
    height: 100%; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .service-emoji { font-size: 2.5rem; margin-bottom: 16px; display: block; }
  .service-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; color: var(--cream);
    margin-bottom: 8px;
  }
  .service-desc { font-size: 0.88rem; line-height: 1.6; color: rgba(255,248,240,0.7); }
  .service-tag {
    display: inline-block; margin-top: 16px;
    padding: 6px 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); backdrop-filter: blur(8px);
    transition: background 0.3s, border-color 0.3s;
  }
  .service-card:hover .service-tag { background: rgba(212,168,83,0.2); border-color: var(--gold); }

  /* ── MENU / ASSORTIMENT ── */
  #menu {
    background: linear-gradient(180deg, var(--cream) 0%, var(--warm) 100%);
    position: relative; overflow: hidden;
  }
  .menu-intro {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end;
    margin-bottom: 60px;
  }
  .menu-desc { font-size: 1rem; line-height: 1.8; color: rgba(44,24,16,0.65); }
  .menu-filter {
    display: flex; gap: 12px; flex-wrap: wrap;
    justify-content: flex-end; align-items: flex-end;
  }
  .filter-btn {
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
    background: transparent; border: 1.5px solid rgba(44,24,16,0.2);
    color: rgba(44,24,16,0.5); cursor: none;
    transition: all 0.3s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--chocolate); border-color: var(--chocolate);
    color: var(--cream);
  }
  .menu-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
  }
  .menu-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    cursor: none;
    transition: transform 0.4s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.4s;

  /* ── MOBILE NAV ── */

  /* ── RESPONSIVE ── */

  @media (max-width: 768px) {

let currentLang = 'cs';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => {
    if (b.textContent.toLowerCase() === lang) b.classList.add('active');
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang] && i18n[lang][key] !== undefined) {
      const val = i18n[lang][key];
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = val;
      else el.innerHTML = val.replace(/\n/g, '<br>');
    }
  });
  buildMenu();
}

// ── MENU DATA ──
const menuData = [
  { key: 1, category: 'classic', price: '75 Kč', badge: 'badge_classic', emoji: '🍵' },
  { key: 2, category: 'seasonal', price: '75 Kč', badge: 'badge_seasonal', emoji: '🥭' },
  { key: 3, category: 'classic', price: '75 Kč', badge: 'badge_classic', emoji: '🍯' },
  { key: 4, category: 'classic', price: '75 Kč', badge: 'badge_classic', emoji: '🍫' },
  { key: 5, category: 'seasonal', price: '75 Kč', badge: 'badge_new', emoji: '🫐' },
  { key: 6, category: 'vegan', price: '75 Kč', badge: 'badge_vegan', emoji: '🍵' },
  { key: 7, category: 'vegan', price: '70 Kč', badge: 'badge_vegan', emoji: '🍇' },
  { key: 8, category: 'classic', price: '80 Kč', badge: 'badge_classic', emoji: '🍦' },
];

function buildMenu(filter = 'all') {
  const t = i18n[currentLang];
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  menuData.forEach((item, idx) => {
    if (filter !== 'all' && item.category !== filter) return;
    const card = document.createElement('div');
    card.className = 'menu-card reveal';
    card.style.transitionDelay = (idx * 0.07) + 's';
    card.innerHTML = `
      <div class="menu-img">
        <span style="font-size:3.5rem">${item.emoji}</span>
        <span class="menu-badge">${t[item.badge] || ''}</span>
      </div>
      <div class="menu-body">
        <div class="menu-name">${t['m'+item.key] || ''}</div>
        <div class="menu-desc-sm">${t['m'+item.key+'d'] || ''}</div>
      </div>
      <div class="menu-footer">
        <span class="menu-price">${item.price}</span>
        <div class="menu-icons">
          ${item.category === 'vegan' ? '<span class="menu-icon" title="Vegan">🌱</span>' : ''}
          <span class="menu-icon" title="Gluten-free">GF</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  // re-observe
  observeReveal();
}

// ── FILTER ──
document.addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    buildMenu(e.target.getAttribute('data-filter'));
  }
});

// ── LOADER LETTERS ──
function animateLoader() {
  const text = 'GELATOLOGIST';
  const el = document.getElementById('loaderText');
  el.innerHTML = text.split('').map((c, i) =>
    `<span style="animation-delay:${0.2 + i*0.06}s">${c}</span>`
  ).join('');
}

// ── CURSOR ──
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx - 6}px, ${my - 6}px)`;
});
function animRing() {
  rx += (mx - rx) * 0.15;
  ry += (my - ry) * 0.15;
  ring.style.transform = `translate(${rx - 20}px, ${ry - 20}px)`;
  requestAnimationFrame(animRing);
}
animRing();
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.style.transform += ' scale(2)'; ring.style.opacity = '0.2'; });
  el.addEventListener('mouseleave', () => { ring.style.opacity = '0.6'; });
});

// ── NAV SCROLL ──
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60);
});

// ── REVEAL ON SCROLL ──
function observeReveal() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
}

// ── MOBILE MENU ──
function openMobile() {
  document.getElementById('mobileMenu').style.display = 'flex';
  requestAnimationFrame(() => document.getElementById('mobileMenu').classList.add('open'));
}
function closeMobile() {
  const m = document.getElementById('mobileMenu');
  m.classList.remove('open');
  setTimeout(() => { m.style.display = 'none'; }, 400);
}

// ── PARTICLES ──
function createParticles() {
  const container = document.getElementById('particles');
  const colors = ['#C4822A', '#D4A853', '#9B4B6E', '#7A9B6E', '#E8B4A0', '#A8D5C0'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*15+10}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(p);
  }
}

// ── INIT ──
animateLoader();
createParticles();
setLang('cs');
observeReveal();
setTimeout(observeReveal, 3200);
</script>
